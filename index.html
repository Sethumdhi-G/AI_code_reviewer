<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Code Reviewer</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --accent: #7fff6e;
    --accent2: #5cc8ff;
    --muted: #4a4a6a;
    --text: #e0e0f0;
    --text-dim: #8888aa;
    --error: #ff5f6e;
    --radius: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Noise overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 40px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: relative;
    z-index: 1;
  }

  .logo-dot {
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 12px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 12px var(--accent); }
    50% { opacity: 0.5; box-shadow: 0 0 4px var(--accent); }
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 1.2rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  header h1 span { color: var(--accent); }

  .badge {
    margin-left: auto;
    font-size: 0.65rem;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    position: relative;
    z-index: 1;
  }

  .panel {
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .panel-left { border-right: 1px solid var(--border); }

  .panel-label {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .controls {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  select {
    background: var(--surface);
    color: var(--text-dim);
    border: 1px solid var(--border);
    padding: 7px 12px;
    border-radius: var(--radius);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }

  select:hover, select:focus { border-color: var(--muted); }

  textarea {
    flex: 1;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    line-height: 1.7;
    resize: none;
    min-height: 420px;
    outline: none;
    transition: border-color 0.2s;
    tab-size: 2;
  }

  textarea::placeholder { color: var(--muted); }
  textarea:focus { border-color: var(--accent2); }

  button#reviewBtn {
    background: var(--accent);
    color: #0a0a0f;
    border: none;
    padding: 11px 24px;
    border-radius: var(--radius);
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 0.82rem;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  button#reviewBtn:hover {
    background: #9fffae;
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(127,255,110,0.25);
  }

  button#reviewBtn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .btn-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  #charCount {
    font-size: 0.7rem;
    color: var(--muted);
    margin-left: auto;
  }

  /* Output panel */
  #output {
    flex: 1;
    min-height: 420px;
    overflow-y: auto;
    padding: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 0.82rem;
    line-height: 1.8;
  }

  .placeholder-msg {
    color: var(--muted);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    text-align: center;
  }

  .placeholder-msg svg { opacity: 0.3; }

  /* Markdown-ish rendering */
  .review-content h2 {
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--accent2);
    margin: 20px 0 8px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    padding-bottom: 4px;
  }

  .review-content h2:first-child { margin-top: 0; }

  .review-content p {
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .review-content ul {
    list-style: none;
    padding: 0;
    margin-bottom: 8px;
  }

  .review-content ul li {
    color: var(--text-dim);
    padding-left: 16px;
    position: relative;
    margin-bottom: 4px;
  }

  .review-content ul li::before {
    content: '›';
    position: absolute;
    left: 0;
    color: var(--accent);
  }

  .review-content code {
    background: #1a1a2e;
    color: var(--accent);
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 0.8rem;
  }

  .review-content pre {
    background: #1a1a2e;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    overflow-x: auto;
    margin: 8px 0;
  }

  .review-content pre code {
    background: none;
    padding: 0;
    color: var(--text);
  }

  .score-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #1a1a2e;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 4px 12px;
    border-radius: 20px;
    font-weight: 700;
    font-size: 0.85rem;
  }

  .loading-dots span {
    display: inline-block;
    animation: blink 1.2s infinite;
    color: var(--accent);
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 100% { opacity: 0; }
    50% { opacity: 1; }
  }

  .error-msg {
    color: var(--error);
    font-size: 0.82rem;
  }

  footer {
    border-top: 1px solid var(--border);
    padding: 12px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.65rem;
    color: var(--muted);
    position: relative;
    z-index: 1;
  }

  @media (max-width: 768px) {
    main { grid-template-columns: 1fr; }
    .panel-left { border-right: none; border-bottom: 1px solid var(--border); }
    header, footer { padding: 16px 20px; }
    .panel { padding: 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-dot"></div>
  <h1>code<span>review</span>.ai</h1>
  <span class="badge">Powered by Claude</span>
</header>

<main>
  <!-- LEFT: Input -->
  <div class="panel panel-left">
    <div class="panel-label">Input</div>

    <div class="controls">
      <select id="language">
        <option value="auto-detect">Auto Detect</option>
        <option value="Python">Python</option>
        <option value="JavaScript">JavaScript</option>
        <option value="Java">Java</option>
        <option value="TypeScript">TypeScript</option>
        <option value="C++">C++</option>
        <option value="Go">Go</option>
        <option value="Rust">Rust</option>
        <option value="SQL">SQL</option>
        <option value="Bash">Bash</option>
      </select>
    </div>

    <textarea id="codeInput" placeholder="// Paste your code here...&#10;// Supports Python, Java, JavaScript, and more.&#10;&#10;function example(arr) {&#10;  for (var i = 0; i &lt; arr.length; i++) {&#10;    console.log(arr[i])&#10;  }&#10;}"></textarea>

    <div class="btn-row">
      <button id="reviewBtn" onclick="reviewCode()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="10"/></svg>
        Analyse Code
      </button>
      <span id="charCount">0 chars</span>
    </div>
  </div>

  <!-- RIGHT: Output -->
  <div class="panel">
    <div class="panel-label">Review</div>
    <div id="output">
      <div class="placeholder-msg">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        <span>Paste code on the left and hit <strong style="color:var(--text)">Analyse</strong></span>
      </div>
    </div>
  </div>
</main>

<footer>
  <span>AI Code Reviewer — Portfolio Project</span>
  <span>claude-sonnet · flask · python</span>
</footer>

<script>
  const textarea = document.getElementById('codeInput');
  const charCount = document.getElementById('charCount');

  textarea.addEventListener('input', () => {
    charCount.textContent = textarea.value.length + ' chars';
  });

  // Tab support in textarea
  textarea.addEventListener('keydown', (e) => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const s = textarea.selectionStart;
      textarea.value = textarea.value.substring(0, s) + '  ' + textarea.value.substring(textarea.selectionEnd);
      textarea.selectionStart = textarea.selectionEnd = s + 2;
    }
  });

  async function reviewCode() {
    const code = document.getElementById('codeInput').value.trim();
    const language = document.getElementById('language').value;
    const output = document.getElementById('output');
    const btn = document.getElementById('reviewBtn');

    if (!code) {
      output.innerHTML = '<p class="error-msg">⚠ Please paste some code first.</p>';
      return;
    }

    btn.disabled = true;
    output.innerHTML = `<div style="color:var(--text-dim);padding:20px 0;">
      Analysing<span class="loading-dots"><span>.</span><span>.</span><span>.</span></span>
    </div>`;

    try {
      const res = await fetch('/review', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code, language })
      });

      const data = await res.json();

      if (data.error) {
        output.innerHTML = `<p class="error-msg">⚠ ${data.error}</p>`;
      } else {
        output.innerHTML = `<div class="review-content">${renderMarkdown(data.review)}</div>`;
      }
    } catch (err) {
      output.innerHTML = `<p class="error-msg">⚠ Network error. Is the server running?</p>`;
    } finally {
      btn.disabled = false;
    }
  }

  function renderMarkdown(text) {
    return text
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/```[\w]*\n([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
      .replace(/^\s*[-*]\s(.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
      .replace(/(?<!<\/h2>|<\/li>|<\/pre>)\n(.+)/g, '<p>$1</p>')
      .replace(/\n/g, '');
  }
</script>
</body>
</html>
